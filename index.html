<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:white;
}

.container{
    background:white;
    width:700px;
    padding:30px;
    margin:50px auto;
    box-shadow:5px 5px 10px gray;
}

h1{
    border-top:5px solid black;
    padding-top:10px;
    display:inline-block;  
    font-family:serif;
    text-shadow:5px 5px pink;
    box-shadow:10px 10px pink;
}

h2{
    border:4px solid;
    border-color:yellow	#8C8C00	 #8C8C00 yellow;
    padding:10px;
    font-style:italic;
    box-shadow: inset 0 0 0 2px black;
}

h3{
    text-align:right;
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="container">

<h1>This is heading 1</h1>

<h2>This is heading 2</h2>

<h3>This is heading 3</h3>

</div>

</body>
</html>
